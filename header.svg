<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 280" width="800" height="280">
  <defs>
    <filter id="card-shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="12" stdDeviation="24" flood-color="#000" flood-opacity="0.5"/>
    </filter>
    <linearGradient id="shimmer" x1="0%" y1="0%" x2="200%" y2="0%">
      <stop offset="0%" stop-color="#D946EF"/>
      <stop offset="25%" stop-color="#6366F1"/>
      <stop offset="50%" stop-color="#22D3EE"/>
      <stop offset="75%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#D946EF"/>
      <animateTransform attributeName="gradientTransform" type="translate" values="0,0;-0.5,0;0,0" dur="4s" repeatCount="indefinite"/>
    </linearGradient>
    <linearGradient id="top-border" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#D946EF" stop-opacity="0.8"/>
      <stop offset="50%" stop-color="#22D3EE" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#D946EF" stop-opacity="0.8"/>
      <animateTransform attributeName="gradientTransform" type="translate" values="0,0;-0.5,0;0,0" dur="4s" repeatCount="indefinite"/>
    </linearGradient>
    <radialGradient id="orb-pink" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#D946EF" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#D946EF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orb-indigo" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#6366F1" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#6366F1" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orb-cyan" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#22D3EE" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#22D3EE" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Card background with 3D drop shadow -->
  <rect x="0" y="0" width="800" height="280" rx="20" fill="#0A0A0A" filter="url(#card-shadow)"/>
  <rect x="0.5" y="0.5" width="799" height="279" rx="20" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>

  <!-- Top gradient accent border -->
  <rect x="30" y="0" width="740" height="3" rx="1.5" fill="url(#top-border)"/>
  <!-- Bottom gradient accent border -->
  <rect x="30" y="277" width="740" height="3" rx="1.5" fill="url(#top-border)"/>

  <!-- Animated background orbs -->
  <circle cx="140" cy="80" r="90" fill="url(#orb-pink)">
    <animate attributeName="cy" values="70;95;70" dur="7s" repeatCount="indefinite"/>
    <animate attributeName="r" values="90;110;90" dur="7s" repeatCount="indefinite"/>
  </circle>
  <circle cx="660" cy="210" r="80" fill="url(#orb-indigo)">
    <animate attributeName="cy" values="220;195;220" dur="6s" repeatCount="indefinite"/>
    <animate attributeName="r" values="80;100;80" dur="6s" repeatCount="indefinite"/>
  </circle>
  <circle cx="400" cy="140" r="70" fill="url(#orb-cyan)">
    <animate attributeName="cy" values="130;155;130" dur="8s" repeatCount="indefinite"/>
    <animate attributeName="r" values="70;90;70" dur="8s" repeatCount="indefinite"/>
  </circle>

  <!-- Connection lines between orbs -->
  <line x1="140" y1="80" x2="400" y2="140" stroke="#6366F1" stroke-opacity="0.05" stroke-width="0.5"/>
  <line x1="400" y1="140" x2="660" y2="210" stroke="#6366F1" stroke-opacity="0.05" stroke-width="0.5"/>
  <line x1="140" y1="80" x2="660" y2="210" stroke="#D946EF" stroke-opacity="0.03" stroke-width="0.3"/>

  <!-- Sparkle dots -->
  <circle cx="18%" cy="22%" r="1.5" fill="#22D3EE">
    <animate attributeName="opacity" values="0;1;0" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="82%" cy="28%" r="1.5" fill="#D946EF">
    <animate attributeName="opacity" values="0;1;0" dur="2.4s" repeatCount="indefinite" begin="0.3s"/>
  </circle>
  <circle cx="22%" cy="78%" r="1" fill="#6366F1">
    <animate attributeName="opacity" values="0;1;0" dur="1.8s" repeatCount="indefinite" begin="0.6s"/>
  </circle>
  <circle cx="78%" cy="75%" r="1" fill="#22D3EE">
    <animate attributeName="opacity" values="0;1;0" dur="2.2s" repeatCount="indefinite" begin="0.9s"/>
  </circle>
  <circle cx="50%" cy="18%" r="1.5" fill="#D946EF">
    <animate attributeName="opacity" values="0;1;0" dur="2.6s" repeatCount="indefinite" begin="0.2s"/>
  </circle>
  <circle cx="92%" cy="55%" r="1" fill="#6366F1">
    <animate attributeName="opacity" values="0;1;0" dur="2.3s" repeatCount="indefinite" begin="0.5s"/>
  </circle>
  <circle cx="8%" cy="50%" r="1" fill="#22D3EE">
    <animate attributeName="opacity" values="0;1;0" dur="2.1s" repeatCount="indefinite" begin="0.7s"/>
  </circle>

  <!-- Main name (gradient shimmer text) -->
  <text x="400" y="125" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="46" font-weight="800" fill="url(#shimmer)" text-anchor="middle" letter-spacing="-0.5">Aarush Karak</text>

  <!-- Username with colored @ symbol -->
  <text x="400" y="165" font-family="'SF Mono', 'Fira Code', 'Cascadia Code', 'JetBrains Mono', Consolas, monospace" font-size="13" fill="#A1A1AA" text-anchor="middle" letter-spacing="4">
    <tspan fill="#D946EF" font-weight="600">@</tspan>3ni8ma
  </text>

  <!-- Tagline -->
  <text x="400" y="205" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="12" fill="#67e8f9" text-anchor="middle" opacity="0.7">Software Developer · Founder · Student</text>

  <!-- Animated glowing dot indicators -->
  <g>
    <circle cx="310" cy="218" r="2.5" fill="#D946EF">
      <animate attributeName="opacity" values="0.2;1;0.2" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="400" cy="218" r="2.5" fill="#6366F1">
      <animate attributeName="opacity" values="0.2;1;0.2" dur="2s" repeatCount="indefinite" begin="0.3s"/>
    </circle>
    <circle cx="490" cy="218" r="2.5" fill="#22D3EE">
      <animate attributeName="opacity" values="0.2;1;0.2" dur="2s" repeatCount="indefinite" begin="0.6s"/>
    </circle>
  </g>
</svg>
