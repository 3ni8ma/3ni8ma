  <text x="600" y="314" text-anchor="middle" fill="#22D3EE" font-family="system-ui,-apple-system,sans-serif" font-size="16" font-weight="800">0</text>
  <!-- Label below -->
  <text x="600" y="346" text-anchor="middle" fill="#666" font-family="system-ui,-apple-system,sans-serif" font-size="11">Code Reviews</text>

  </g>
</g>

