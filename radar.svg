  <polygon points="545,318 675,318 665,328 535,328" fill="rgba(34,211,238,0.5)" stroke="none"/>
  <polygon points="665,328 675,318 675,320 665,330" fill="rgba(34,211,238,0.25)" stroke="none"/>
  <rect x="535" y="328" width="130" height="2" rx="4" fill="#22D3EE"/>
