<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <defs>
    <filter id="card-shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="12" stdDeviation="24" flood-color="#000" flood-opacity="0.5"/>
    </filter>
    <linearGradient id="shimmer" x1="0%" y1="0%" x2="200%" y2="0%">
      <stop offset="0%" stop-color="#D946EF"/>
      <stop offset="25%" stop-color="#6366F1"/>
      <stop offset="50%" stop-color="#22D3EE"/>
      <stop offset="75%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#D946EF"/>
      <animateTransform attributeName="gradientTransform" type="translate" values="0,0;-0.5,0;0,0" dur="4s" repeatCount="indefinite"/>
    </linearGradient>
    <linearGradient id="top-border" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#D946EF" stop-opacity="0.8"/>
      <stop offset="50%" stop-color="#22D3EE" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#D946EF" stop-opacity="0.8"/>
      <animateTransform attributeName="gradientTransform" type="translate" values="0,0;-0.5,0;0,0" dur="4s" repeatCount="indefinite"/>
    </linearGradient>
    <radialGradient id="orb-pink" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#D946EF" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#D946EF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orb-indigo" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#6366F1" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#6366F1" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orb-cyan" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#22D3EE" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#22D3EE" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="radar-fill" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D946EF" stop-opacity="0.2"/>
      <stop offset="50%" stop-color="#6366F1" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#22D3EE" stop-opacity="0.2"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="800" height="400" rx="20" fill="#0A0A0A" filter="url(#card-shadow)"/>
  <rect x="0.5" y="0.5" width="799" height="399" rx="20" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
  <rect x="30" y="0" width="740" height="3" rx="1.5" fill="url(#top-border)"/>
  <rect x="30" y="397" width="740" height="3" rx="1.5" fill="url(#top-border)"/>

  <circle cx="100" cy="60" r="50" fill="url(#orb-pink)">
    <animate attributeName="cy" values="50;70;50" dur="6s" repeatCount="indefinite"/>
  </circle>
  <circle cx="720" cy="340" r="60" fill="url(#orb-indigo)">
    <animate attributeName="cx" values="710;730;710" dur="8s" repeatCount="indefinite"/>
  </circle>

  <text x="40" y="42" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="700" fill="url(#shimmer)">Skill Radar</text>
  <text x="40" y="62" font-family="system-ui, sans-serif" font-size="12" fill="#A1A1AA">Contributions: 46 · Stars: 19 · Streak: 1 day</text>

  <g transform="translate(400, 200)">
    <circle cx="0" cy="0" r="130" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
    <circle cx="0" cy="0" r="100" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
    <circle cx="0" cy="0" r="70" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
    <circle cx="0" cy="0" r="40" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>

    <line x1="0" y1="-130" x2="0" y2="130" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
    <line x1="-130" y1="0" x2="130" y2="0" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
    <line x1="-92" y1="-92" x2="92" y2="92" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
    <line x1="92" y1="-92" x2="-92" y2="92" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
    <line x1="-71" y1="-109" x2="71" y2="109" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
    <line x1="71" y1="-109" x2="-71" y2="109" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>

    <polygon points="0,-120 86,-86 109,50 0,95 -109,50" fill="url(#radar-fill)" stroke="#6366F1" stroke-width="2" opacity="0.8"/>
    <polygon points="0,-110 78,-78 99,45 0,86 -99,45" fill="none" stroke="#D946EF" stroke-width="1.5" stroke-dasharray="4,4" opacity="0.6"/>

    <circle cx="0" cy="-120" r="4" fill="#D946EF"/>
    <circle cx="86" cy="-86" r="4" fill="#6366F1"/>
    <circle cx="109" cy="50" r="4" fill="#22D3EE"/>
    <circle cx="0" cy="95" r="4" fill="#D946EF"/>
    <circle cx="-109" cy="50" r="4" fill="#6366F1"/>

    <text x="0" cy="-145" y="-145" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#D946EF">TypeScript</text>
    <text x="110" y="-82" text-anchor="start" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#6366F1">Python</text>
    <text x="125" y="54" text-anchor="start" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#22D3EE">React</text>
    <text x="0" y="120" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#D946EF">JavaScript</text>
    <text x="-130" y="54" text-anchor="end" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#6366F1">Node.js</text>
  </g>

  <g transform="translate(40, 330)">
    <rect x="0" y="0" width="340" height="55" rx="12" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
    <text x="14" y="20" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#a5b4fc">Languages &amp; Frameworks</text>
    <text x="14" y="38" font-family="system-ui, sans-serif" font-size="10" fill="#71717A">Python, TypeScript, JavaScript · React, Node.js, Vite, Tailwind</text>
  </g>

  <g transform="translate(420, 330)">
    <rect x="0" y="0" width="340" height="55" rx="12" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
    <text x="14" y="20" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#a5b4fc">Tools &amp; Platforms</text>
    <text x="14" y="38" font-family="system-ui, sans-serif" font-size="10" fill="#71717A">Three.js, PostgreSQL, Arduino · Vite, Tailwind CSS, Framer Motion</text>
  </g>
</svg>
