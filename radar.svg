<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
<defs>
  <filter id="card-shadow" x="-10%" y="-10%" width="120%" height="130%">
    <feDropShadow dx="0" dy="12" stdDeviation="24" flood-color="#0f0f0f" flood-opacity="0.6"/>
  </filter>
  <linearGradient id="radar-fill" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#D946EF" stop-opacity="0.3"/>
    <stop offset="50%" stop-color="#6366F1" stop-opacity="0.2"/>
    <stop offset="100%" stop-color="#22D3EE" stop-opacity="0.1"/>
  </linearGradient>
  <linearGradient id="radar-stroke" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#D946EF"/>
    <stop offset="100%" stop-color="#22D3EE"/>
  </linearGradient>
</defs>
<rect width="800" height="400" fill="#0a0a0a" rx="16"/>
<text x="400" y="30" text-anchor="middle" fill="#D946EF" font-family="system-ui, sans-serif" font-size="13" font-weight="600" letter-spacing="2">SKILL RADAR</text>
<g transform="translate(20,30)">
    <circle cx="240" cy="180" r="120" fill="none" stroke="#1f1f1f" stroke-width="1"/>
    <circle cx="240" cy="180" r="90" fill="none" stroke="#1f1f1f" stroke-width="1" stroke-dasharray="4,4"/>
    <circle cx="240" cy="180" r="60" fill="none" stroke="#1f1f1f" stroke-width="1" stroke-dasharray="4,4"/>
    <circle cx="240" cy="180" r="30" fill="none" stroke="#1f1f1f" stroke-width="1" stroke-dasharray="4,4"/>
    <polygon points="240.0,132.0 269.7,170.4 289.4,248.0 232.9,189.7 233.2,177.8" fill="url(#radar-fill)" stroke="url(#radar-stroke)" stroke-width="2"/>
    <circle cx="240" cy="180" r="3" fill="#22D3EE"/>
    <text x="240" y="26" text-anchor="middle" fill="#888" font-family="system-ui, sans-serif" font-size="11">Stars</text>
    <text x="240" y="42" text-anchor="middle" fill="#D946EF" font-family="system-ui, sans-serif" font-size="14" font-weight="700">12</text>
    <text x="381" y="128" text-anchor="start" fill="#888" font-family="system-ui, sans-serif" font-size="11">Contributions</text>
    <text x="381" y="144" text-anchor="start" fill="#D946EF" font-family="system-ui, sans-serif" font-size="14" font-weight="700">53</text>
    <text x="327" y="294" text-anchor="start" fill="#888" font-family="system-ui, sans-serif" font-size="11">Repos</text>
    <text x="327" y="310" text-anchor="start" fill="#D946EF" font-family="system-ui, sans-serif" font-size="14" font-weight="700">14</text>
    <text x="153" y="294" text-anchor="end" fill="#888" font-family="system-ui, sans-serif" font-size="11">Followers</text>
    <text x="153" y="310" text-anchor="end" fill="#D946EF" font-family="system-ui, sans-serif" font-size="14" font-weight="700">1</text>
    <text x="99" y="128" text-anchor="end" fill="#888" font-family="system-ui, sans-serif" font-size="11">Streak</text>
    <text x="99" y="144" text-anchor="end" fill="#D946EF" font-family="system-ui, sans-serif" font-size="14" font-weight="700">2d</text>
</g>
<g transform="translate(420, 60)">
  <text x="0" y="0" fill="#fff" font-family="system-ui, sans-serif" font-size="24" font-weight="700">GitHub Profile Stats</text>
  <text x="0" y="28" fill="#888" font-family="system-ui, sans-serif" font-size="13">Real-time metrics from the GitHub API</text>
  <rect x="0" y="50" width="340" height="1" fill="#1f1f1f"/>
  <text x="0" y="80" fill="#666" font-family="system-ui, sans-serif" font-size="13">Total Stars</text>
  <text x="340" y="80" text-anchor="end" fill="#22D3EE" font-family="system-ui, sans-serif" font-size="18" font-weight="700">12</text>
  <text x="0" y="110" fill="#666" font-family="system-ui, sans-serif" font-size="13">Contributions (this year)</text>
  <text x="340" y="110" text-anchor="end" fill="#D946EF" font-family="system-ui, sans-serif" font-size="18" font-weight="700">53</text>
  <text x="0" y="140" fill="#666" font-family="system-ui, sans-serif" font-size="13">Public Repositories</text>
  <text x="340" y="140" text-anchor="end" fill="#6366F1" font-family="system-ui, sans-serif" font-size="18" font-weight="700">14</text>
  <text x="0" y="170" fill="#666" font-family="system-ui, sans-serif" font-size="13">Current Streak</text>
  <text x="340" y="170" text-anchor="end" fill="#22D3EE" font-family="system-ui, sans-serif" font-size="18" font-weight="700">2 days</text>
  <text x="0" y="200" fill="#666" font-family="system-ui, sans-serif" font-size="13">Followers</text>
  <text x="340" y="200" text-anchor="end" fill="#D946EF" font-family="system-ui, sans-serif" font-size="18" font-weight="700">1</text>
</g>
</svg>